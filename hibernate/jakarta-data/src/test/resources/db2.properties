db-url=replaced-by-runtime-value
db-password=replaced-by-runtime-value
db-username=replaced-by-runtime-value

quarkus.http.auth.basic=true
quarkus.security.users.embedded.enabled=true
quarkus.security.users.embedded.plain-text=true
quarkus.security.users.embedded.users.martin=martin
quarkus.security.users.embedded.roles.martin=admin

quarkus.security.users.embedded.users.alice=alice
quarkus.security.users.embedded.roles.alice=reader
quarkus.security.users.embedded.users.bob=bob
quarkus.security.users.embedded.roles.bob=writer
quarkus.security.users.embedded.users.andy=andy
quarkus.security.users.embedded.roles.andy=reader-writer

quarkus.http.auth.policy.role-policy1.roles-allowed=reader,writer,reader-writer
quarkus.http.auth.policy.role-policy1.permissions.reader=read
quarkus.http.auth.policy.role-policy1.permissions.reader-writer=read,write
quarkus.http.auth.permission.roles1.paths=/book/*/type-permission,/book/*/method-permission,/book/*/method-multiple-permissions,/book/add/permission,/book/*/delete/permission
quarkus.http.auth.permission.roles1.policy=role-policy1

# TODO: drop when https://github.com/quarkusio/quarkus/issues/46890 gets fixed
quarkus.native.monitoring=none

quarkus.hibernate-orm.db2.packages=io.quarkus.ts.jakarta.data.db
quarkus.hibernate-orm.db2.schema-management.strategy=drop-and-create
quarkus.hibernate-orm.db2.datasource=db2
quarkus.hibernate-orm.db2.active=false
%db2.quarkus.hibernate-orm.db2.active=true
quarkus.datasource.db2.db-kind=db2
quarkus.datasource.db2.active=false
%db2.quarkus.datasource.db2.active=true
quarkus.datasource.db2.username=${db-username}
quarkus.datasource.db2.password=${db-password}
quarkus.datasource.db2.jdbc.url=${db-url}
